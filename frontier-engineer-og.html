<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OG Image — Frontier Engineer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif;
    background: #0a0a0a;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 72px 80px 56px;
    position: relative;
  }

  /* Subtle top accent line */
  .accent-line {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg, #1D9E75 0%, #534AB7 100%);
  }

  /* Corner mark */
  .corner-mark {
    position: absolute;
    top: 72px;
    right: 80px;
    width: 48px;
    height: 48px;
    border-top: 3px solid #1D9E75;
    border-right: 3px solid #1D9E75;
    opacity: 0.6;
  }

  .top-section {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .label {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #1D9E75;
  }

  .title {
    font-size: 52px;
    font-weight: 700;
    line-height: 1.12;
    color: #ffffff;
    max-width: 960px;
    margin-top: 16px;
    letter-spacing: -1px;
  }

  .bottom-section {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .brand-chevron {
    width: 28px;
    height: 28px;
  }

  .brand-name {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: #ffffff;
  }

  .subtitle {
    font-size: 16px;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Subtle grid pattern */
  .grid-pattern {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 400px;
    height: 300px;
    opacity: 0.03;
    background-image:
      linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
    background-size: 40px 40px;
  }
</style>
</head>
<body>
  <div class="accent-line"></div>
  <div class="corner-mark"></div>
  <div class="grid-pattern"></div>

  <div class="top-section">
    <div class="label">Enso Labs Insights</div>
    <h1 class="title">The Forward-Deployed Engineer Is the New Management Consultant</h1>
  </div>

  <div class="bottom-section">
    <div class="brand">
      <!-- Teal chevron mark -->
      <svg class="brand-chevron" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 22L14 6L24 22" stroke="#1D9E75" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span class="brand-name">Enso Labs</span>
    </div>
    <div class="subtitle">ensolabs.ai</div>
  </div>
</body>
</html>
