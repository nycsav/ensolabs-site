<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Top accent gradient line -->
  <defs>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1D9E75"/>
      <stop offset="1" stop-color="#534AB7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="4" fill="url(#accentGrad)"/>

  <!-- Subtle grid pattern (bottom-right) -->
  <g opacity="0.035">
    <line x1="800" y1="330" x2="800" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="840" y1="330" x2="840" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="880" y1="330" x2="880" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="920" y1="330" x2="920" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="960" y1="330" x2="960" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="1000" y1="330" x2="1000" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="1040" y1="330" x2="1040" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="1080" y1="330" x2="1080" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="1120" y1="330" x2="1120" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="1160" y1="330" x2="1160" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="1200" y1="330" x2="1200" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="800" y1="370" x2="1200" y2="370" stroke="#fff" stroke-width="0.5"/>
    <line x1="800" y1="410" x2="1200" y2="410" stroke="#fff" stroke-width="0.5"/>
    <line x1="800" y1="450" x2="1200" y2="450" stroke="#fff" stroke-width="0.5"/>
    <line x1="800" y1="490" x2="1200" y2="490" stroke="#fff" stroke-width="0.5"/>
    <line x1="800" y1="530" x2="1200" y2="530" stroke="#fff" stroke-width="0.5"/>
    <line x1="800" y1="570" x2="1200" y2="570" stroke="#fff" stroke-width="0.5"/>
    <line x1="800" y1="610" x2="1200" y2="610" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Corner mark (top-right) -->
  <path d="M1120 72 L1120 48 L1120 48" stroke="#1D9E75" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M1096 48 L1120 48 L1120 72" stroke="#1D9E75" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>

  <!-- Label: ENSO LABS INSIGHTS -->
  <text x="80" y="100" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#1D9E75" letter-spacing="3">ENSO LABS INSIGHTS</text>

  <!-- Title (two lines) -->
  <text x="80" y="190" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">The Forward-Deployed Engineer</text>
  <text x="80" y="254" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">Is the New Management Consultant</text>

  <!-- Brand: Chevron + Enso Labs -->
  <path d="M80 574 L94 554 L108 574" stroke="#1D9E75" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="122" y="574" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#ffffff">Enso Labs</text>

  <!-- Domain -->
  <text x="1120" y="574" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="rgba(255,255,255,0.45)" text-anchor="end" letter-spacing="1">ENSOLABS.AI</text>
</svg>
